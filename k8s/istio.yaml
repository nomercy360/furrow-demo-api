# "Platform-provided" Istio routing, the kind furrow's canary patches the
# weights of. The stable/canary Services are what a progressive rollout
# shifts traffic between.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: demo-api
spec:
  hosts:
    - demo-api
  http:
    - route:
        - destination:
            host: demo-api
          weight: 100
        - destination:
            host: demo-api-canary
          weight: 0
