# Main release: the canary-gated API. Sibling *.furrow.yaml files declare the
# other releases (Flux-style, one file per release); everything renders into
# furrow's single SSA + prune inventory.
render: helm
chart: ./charts/app
releaseName: demo-api
valuesFiles:
  - secrets.yaml # age-encrypted; furrow decrypts in-memory (FURROW_DECRYPT=age)
values:
  replicas: 1
  # hello
  appVersion: "1.1.2"

  # furrow's image automation tracks the newest CI build; with render-gating the
  # bump IS the release (canary ramp -> gates -> snapshot advance).
  image: ghcr.io/nomercy360/furrow-demo-api:main-8c39f67-1783163935 # furrow:extract:numeric:^main-[a-f0-9]+-(?P<ts>\d+)$

  canaryFail: false  # true renders FAIL=true -> the gate catches it -> rollback
  versionLabels: true # canary identity (version: stable) — required for the gated workload
  service:
    enabled: true
  loadgen:
    enabled: true
  appSecret:
    enabled: true
  dbEnv:
    enabled: true

