# Main release: the canary-gated API. Sibling *.furrow.yaml files declare the
# other releases (Flux-style, one file per release); everything renders into
# furrow's single SSA + prune inventory.
render: helm
chart: ./charts/app
releaseName: demo-api
valuesFiles:
  - values-api.yaml
  - secrets.yaml # age-encrypted; furrow decrypts in-memory (FURROW_DECRYPT=age)
