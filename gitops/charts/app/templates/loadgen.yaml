{{- if .Values.loadgen.enabled }}
# Constant low traffic through the mesh so istio_requests_total always has
# data for the canary gate (an idle canary has no metrics to judge).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-loadgen
  labels:
    app: {{ .Release.Name }}-loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-loadgen
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-loadgen
    spec:
      containers:
        - name: curl
          image: curlimages/curl:8.11.1
          command: ["/bin/sh", "-c"]
          args:
            - while true; do curl -s -o /dev/null http://{{ .Release.Name }}/; sleep 0.2; done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
{{- end }}
