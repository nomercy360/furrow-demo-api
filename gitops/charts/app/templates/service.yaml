{{- if .Values.service.enabled }}
# Selects on `app` only (no version label), so it spans stable AND canary pods;
# the DestinationRule subsets split them for the weighted routes.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: 8080
{{- end }}
