# furrow canary spec — plain YAML, no CRD, and NO trigger field: stable runs
# the last-promoted render of the workload below; any change to its rendered
# manifest in git (image bump, env change, secret checksum) IS the release.
# furrow derives demo-api-canary from HEAD's render, creates/owns the
# VirtualService + DestinationRule, ramps the weight through the steps, gates
# each step on Prometheus, and rolls back without ever touching stable.
promote:
  workload: demo-api # the ONE required name — everything else derives from it

# Let furrow create the VS itself (mesh-internal host = the Service name).
route:
  hosts: [demo-api]

steps:
  - { weight: 20, pause: 45s }
  - { weight: 50, pause: 45s }
  - { weight: 80, pause: 45s }

analysis:
  # Canary success rate, as seen by the mesh. Window must be >= 2x the
  # Prometheus scrape interval (1m here). Must stay >= 95%.
  query: >-
    sum(rate(istio_requests_total{destination_workload="demo-api-canary",response_code!~"5.."}[2m]))
    /
    sum(rate(istio_requests_total{destination_workload="demo-api-canary"}[2m]))
  threshold: 0.95
  noDataTimeout: 3m

progressDeadline: 10m
