# Rendered from the age-encrypted values file (gitops/secrets.yaml): git holds
# ciphertext, furrow decrypts in-memory at render time, and this Secret joins
# the same ApplySet inventory as everything else.
apiVersion: v1
kind: Secret
metadata:
  name: demo-api-secret
  labels:
    app: demo-api
stringData:
  SECRET_MESSAGE: {{ required "secretMessage must come from the sealed values file" .Values.secretMessage | quote }}
