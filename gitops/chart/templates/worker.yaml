# Second workload, same image, NOT canary-gated: the canary spec names only
# demo-api, so this applies straight through on every sync. Wired to the
# database via the shared ConfigMap (coordinates) + Secret (credential).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-worker
  labels:
    app: demo-worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: demo-worker
  template:
    metadata:
      labels:
        app: demo-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
        # Rolls the worker when the DB credential rotates (ungated by design).
        checksum/db: {{ .Values.dbPassword | sha256sum }}
    spec:
      containers:
        - name: worker
          image: {{ .Values.image }}
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: {{ .Values.appVersion | quote }}
          envFrom:
            - configMapRef:
                name: demo-db-config
            - secretRef:
                name: demo-db-secret
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi
