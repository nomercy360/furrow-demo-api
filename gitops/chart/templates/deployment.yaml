# The STABLE deployment only. furrow derives demo-api-canary from this at
# rollout time (name, version label, image, optional FAIL env all overridden).
# The `version: stable` pod label is what the DestinationRule's stable subset
# selects — it must match the canary spec's stableSubset (default "stable").
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api
  labels:
    app: demo-api
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: demo-api
      version: stable
  template:
    metadata:
      labels:
        app: demo-api
        version: stable
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
        # A changed secret changes this hash -> pod template changes -> rollout.
        # SSA-applied, so it works without helm hooks or a reloader operator.
        checksum/secret: {{ .Values.secretMessage | sha256sum }}
    spec:
      containers:
        - name: api
          image: {{ .Values.image }}
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: {{ .Values.appVersion | quote }}
            {{- if .Values.canaryFail }}
            # Rendered only when the bad-release knob is on: the render diff
            # triggers a canary that 500s every request; stable keeps the old
            # render (without this env) until the gate would pass — it won't.
            - name: FAIL
              value: "true"
            {{- end }}
          envFrom:
            - secretRef:
                name: demo-api-secret
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi
