# Database credential, rendered from the age-sealed values file — git only
# ever holds ciphertext. Postgres bootstraps from it; both app workloads
# receive it as DB_PASSWORD.
apiVersion: v1
kind: Secret
metadata:
  name: demo-db-secret
  labels:
    app: postgres
stringData:
  DB_PASSWORD: {{ required "dbPassword must come from the sealed values file" .Values.dbPassword | quote }}
