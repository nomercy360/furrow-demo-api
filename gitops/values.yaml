replicas: 1
appVersion: "1.0.0"

# Stable image. On a successful canary promote, furrow rewrites this key to the
# canary image and commits ("fold"), then scales the canary to 0.
image: ghcr.io/nomercy360/furrow-demo-api:8d5c367228f8f70bac1f841ca700aab8269ae185

# The release candidate. furrow's image automation keeps this pointed at the
# newest CI build (ordered by the timestamp in main-<sha>-<epoch> tags); bumping
# canary.yaml's revision then ramps whatever candidate is current.
canaryImage: ghcr.io/nomercy360/furrow-demo-api:main-afbd90f-1783133974 # furrow:extract:numeric:^main-[a-f0-9]+-(?P<ts>\d+)$

# true = furrow injects FAIL=true into the derived canary -> every request 500s
# -> the Prometheus gate trips -> auto-rollback. The bad-release demo knob.
canaryFail: false
