replicas: 1
appVersion: "1.1.0"

# THE image. furrow's image automation keeps it pointed at the newest CI build
# (ordered by the timestamp in main-<sha>-<epoch> tags) — and with render-gating
# that bump IS the release: the canary ramps HEAD's render and stable only
# rolls when the gates pass (the last-promoted render is held until then).
image: ghcr.io/nomercy360/furrow-demo-api:main-afbd90f-1783133974 # furrow:extract:numeric:^main-[a-f0-9]+-(?P<ts>\d+)$

# true renders FAIL=true into the deployment env -> the render diff triggers a
# canary whose requests all 500 -> the Prometheus gate trips -> auto-rollback,
# and stable (still on the old render, without FAIL) never sees it.
canaryFail: false
